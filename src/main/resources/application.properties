# Database Configuration (With Cloud Overrides)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ems_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:12345}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server property (Render uses PORT env variable)
server.port=${PORT:8081}

# Error Handling
server.error.include-message=always

# Initialization
spring.sql.init.mode=never
spring.jpa.defer-datasource-initialization=true

# File upload limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.ems=INFO
logging.file.name=logs/ems-app.log
