<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Narayana Portal | Secure Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Company Branding / Logo -->
            <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem;">
                <div
                    style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 5px;">
                    <div
                        style="background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); color: white; width: 45px; height: 45px; border-radius: 10px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.15);">
                        <i class="fa-solid fa-n" style="font-weight: 900; font-size: 1.8rem;"></i>
                    </div>
                    <h2
                        style="margin: 0; font-size: 2.2rem; font-weight: 800; letter-spacing: 0.5px; color: #1e293b; padding: 0;">
                        Narayana</h2>
                </div>
                <div
                    style="color: #1e293b; font-size: 0.8rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;">
                    Private Limited</div>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="username" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>
                <button type="submit" class="login-btn">Secure Login</button>
            </form>
            <p id="errorMsg" style="color: #ffb7b7; margin-top: 1rem; text-align: center; display: none;">Invalid
                username or password</p>
        </div>
    </div>
    <script src="script.js?v=2.0"></script>
</body>

</html>
